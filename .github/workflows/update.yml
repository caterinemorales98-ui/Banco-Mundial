name: Actualizar Monitor CA

on:
  schedule:
    - cron: '0 13 * * *'   # 7am Costa Rica (UTC-6) = 13:00 UTC
    - cron: '0 19 * * *'   # 1pm Costa Rica = 19:00 UTC
  workflow_dispatch:        # permite ejecutar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar generador del dashboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py

      - name: Commit y push del HTML actualizado
        run: |
          git config user.name "Monitor CA Bot"
          git config user.email "bot@monitor-ca.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard actualizado $(date +'%Y-%m-%d %H:%M') UTC"
          git push
